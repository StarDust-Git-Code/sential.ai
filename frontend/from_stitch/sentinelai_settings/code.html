<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SentinelAI - API Key Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#5516be",
                        "on-surface": "#d3e4fe",

                        "secondary-fixed-dim": "#adc6ff",
                        "secondary-container": "#0566d9",
                        "on-secondary-fixed-variant": "#004395",
                        "surface-variant": "#26364a",
                        "surface-dim": "#031427",
                        "on-background": "#d3e4fe",
                        "on-tertiary-container": "#4600a7",
                        "surface-container-highest": "#26364a",
                        "secondary-fixed": "#d8e2ff",
                        "on-tertiary": "#3c0091",
                        "tertiary-fixed-dim": "#d0bcff",
                        "on-primary-fixed-variant": "#005236",
                        "surface-container-low": "#0b1c30",
                        "on-secondary": "#002e6a",
                        "on-primary-fixed": "#002113",
                        "secondary": "#adc6ff",
                        "on-tertiary-fixed": "#23005c",
                        "on-primary-container": "#00422b",
                        "tertiary-fixed": "#e9ddff",
                        "on-secondary-container": "#e6ecff",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "primary-fixed": "#6ffbbe",
                        "on-primary": "#003824",
                        "outline-variant": "#3c4a42",
                        "tertiary-container": "#b090ff",
                        "surface-bright": "#2a3a4f",
                        "inverse-primary": "#006c49",
                        "outline": "#86948a",
                        "on-surface-variant": "#bbcabf",
                        "surface-tint": "#4edea3",
                        "surface-container-high": "#1b2b3f",
                        "background": "#031427",
                        "primary-container": "#10b981",
                        "surface-container-lowest": "#000f21",
                        "tertiary": "#d0bcff",
                        "surface-container": "#102034",
                        "on-secondary-fixed": "#001a42",
                        "surface": "#031427",
                        "inverse-surface": "#d3e4fe",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "max-width": "1440px",
                        "gutter": "16px",
                        "stack-lg": "32px",
                        "container-margin": "24px",
                        "stack-sm": "8px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],

                        "headline-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "code-sm": ["JetBrains Mono"]

                }

<style>
        .glass-panel {
            background: rgba(3, 20, 39, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(78, 222, 163, 0.05);
        }
        .glow-active {
            box-shadow: 0 0 15px rgba(78, 222, 163, 0.3);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-gutter font-body-md relative overflow-hidden">
<!-- Background Tech Pattern -->
<div class="absolute inset-0 z-0 opacity-20" style="background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.15) 1px, transparent 0); background-size: 24px 24px;"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] z-0 pointer-events-none"></div>
<!-- Modal Container -->
<main class="glass-panel rounded-xl w-full max-w-2xl z-10 relative flex flex-col shadow-2xl">
<!-- Header -->
<header class="flex items-center justify-between p-container-margin border-b border-white/10">
<div class="flex items-center gap-stack-md">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center border border-white/10 glow-active">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">vpn_key</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md text-on-surface">API Key Management</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">2 Active Keys Configured</p>
</div>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Body -->
<div class="p-container-margin flex flex-col gap-stack-lg">
<!-- Disclaimer -->
<div class="bg-surface-container-high rounded-lg p-stack-md border-l-2 border-secondary flex items-start gap-stack-md">
<span class="material-symbols-outlined text-secondary mt-1">shield_lock</span>
<div>
<h2 class="font-label-caps text-label-caps text-secondary mb-1">Local Storage Security</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Keys are cached locally and never sent to our servers. Ensure your local environment is secure.</p>
</div>
</div>
<!-- Add Key Input -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="new-key">Add New SentinelAI Key</label>
<div class="flex gap-stack-sm">
<div class="relative flex-grow">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">key</span>
<input class="w-full bg-surface-container border border-white/10 rounded-lg py-2 pl-10 pr-4 text-on-surface font-code-md text-code-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder-outline transition-all" id="new-key" placeholder="sk-..." type="password"/>
</div>
<button class="bg-primary text-on-primary font-label-caps text-label-caps px-6 py-2 rounded-lg hover:bg-primary-fixed transition-colors flex items-center gap-2">
<span class="material-symbols-outlined" style="font-size: 18px;">add</span>
                        Add Key
                    </button>
</div>
</div>
<!-- Key List -->
<div class="flex flex-col gap-stack-sm">
<h3 class="font-label-caps text-label-caps text-on-surface-variant border-b border-white/10 pb-2 mb-2">Active Keys</h3>
<!-- List Item 1 -->
<div class="flex items-center justify-between bg-surface-container/50 rounded-lg p-stack-md border border-white/5 hover:border-white/10 transition-colors group">
<div class="flex items-center gap-stack-md">
<div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(78,222,163,0.8)]"></div>
<div>
<p class="font-code-md text-code-md text-on-surface">sk-...a1b2c3d4</p>
<p class="font-label-caps text-label-caps text-on-surface-variant mt-1">Added: Oct 24, 2024</p>
</div>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors p-2 opacity-0 group-hover:opacity-100 focus:opacity-100 rounded hover:bg-error/10">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- List Item 2 -->
<div class="flex items-center justify-between bg-surface-container/50 rounded-lg p-stack-md border border-white/5 hover:border-white/10 transition-colors group">
<div class="flex items-center gap-stack-md">
<div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(78,222,163,0.8)]"></div>
<div>
<p class="font-code-md text-code-md text-on-surface">sk-...e5f6g7h8</p>
<p class="font-label-caps text-label-caps text-on-surface-variant mt-1">Added: Nov 02, 2024</p>
</div>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors p-2 opacity-0 group-hover:opacity-100 focus:opacity-100 rounded hover:bg-error/10">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
</div>
</div>
<!-- Footer -->
<footer class="p-container-margin border-t border-white/10 bg-surface/30 flex justify-end gap-stack-md rounded-b-xl">
<button class="px-6 py-2 rounded-lg border border-white/10 text-on-surface font-label-caps text-label-caps hover:bg-white/5 transition-colors">Cancel</button>
<button class="px-6 py-2 rounded-lg bg-primary text-on-primary font-label-caps text-label-caps hover:bg-primary-fixed transition-colors">Done</button>
</footer>
</main>
</body></html>
