<svg width="800" height="160" viewBox="0 0 800 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-weight: 900; font-size: 38px; fill: url(#gradient-text); letter-spacing: 4px; }
    .subtitle { font-family: 'Fira Code', 'Courier New', monospace; font-weight: 600; font-size: 14px; fill: #00E5FF; letter-spacing: 2px; }
    .grid-line { stroke: #161B22; stroke-width: 0.8; }
    .accent-node { fill: #00E5FF; filter: drop-shadow(0px 0px 4px #00E5FF); }
    .glow-border { stroke: url(#gradient-border); stroke-width: 1.5; opacity: 0.8; }
  </style>
  
  <rect width="100%" height="160" rx="8" fill="#0D1117"/>
  
  <!-- Cyber Grid Lines -->
  <path class="grid-line" d="M 0 32 L 800 32 M 0 64 L 800 64 M 0 96 L 800 96 M 0 128 L 800 128" />
  <path class="grid-line" d="M 80 0 L 80 160 M 160 0 L 160 160 M 240 0 L 240 160 M 320 0 L 320 160 M 400 0 L 400 160 M 480 0 L 480 160 M 560 0 L 560 160 M 640 0 L 640 160 M 720 0 L 720 160" />
  
  <!-- Outer Glowing Border -->
  <rect x="1" y="1" width="798" height="158" rx="7" class="glow-border" />
  
  <!-- Top Cyber Accent Marks -->
  <path d="M 20 12 H 100 L 110 22 H 20 Z" fill="#9D00FF" opacity="0.3"/>
  <rect x="25" y="15" width="4" height="4" fill="#00E5FF"/>
  <rect x="34" y="15" width="4" height="4" fill="#FF007F"/>
  
  <!-- Brand Content -->
  <text x="50" y="75" class="title">STARDUST_</text>
  <text x="50" y="112" class="subtitle">CYBER-PHYSICAL SYSTEMS ENGINEER // v2.4.0</text>
  
  <!-- High-tech Node Graph Network Diagram -->
  <g transform="translate(670, 35)">
    <line x1="45" y1="15" x2="15" y2="50" stroke="#9D00FF" stroke-width="1.5" opacity="0.7"/>
    <line x1="45" y1="15" x2="75" y2="50" stroke="#FF007F" stroke-width="1.5" opacity="0.7"/>
    <line x1="15" y1="50" x2="45" y2="85" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
    <line x1="75" y1="50" x2="45" y2="85" stroke="#9D00FF" stroke-width="1.5" opacity="0.7"/>
    <line x1="15" y1="50" x2="75" y2="50" stroke="#161B22" stroke-dasharray="2 2" stroke-width="1"/>
    
    <circle cx="45" cy="15" r="4" fill="#FF007F"/>
    <circle cx="15" cy="50" r="5" class="accent-node"/>
    <circle cx="75" cy="50" r="5" fill="#9D00FF"/>
    <circle cx="45" cy="85" r="4" fill="#00E5FF"/>
  </g>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradient-border" x1="0" y1="0" x2="800" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#9D00FF"/>
      <stop offset="1" stop-color="#FF007F"/>
    </linearGradient>
    <linearGradient id="gradient-text" x1="50" y1="40" x2="380" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.6" stop-color="#9D00FF"/>
      <stop offset="1" stop-color="#FF007F"/>
    </linearGradient>
  </defs>
</svg>
